<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <!--
    Permette alla pagina di adattarsi correttamente
    a smartphone e tablet.
  -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>KiRating</title>

  <!--
    Foglio di stile della libreria Leaflet,
    utilizzata per la mappa interattiva.
  -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Foglio di stile principale del sito -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- =====================================================
       BARRA SUPERIORE
       Logo a sinistra, Login e menu a destra.
       ===================================================== -->
  <header class="topbar">

    <!-- Logo cliccabile che riporta alla home -->
    <a href="/" class="logo" aria-label="Torna alla home">
      <img src="logo-kira.jpeg" alt="KiRating" />
    </a>

    <!-- Parte destra della barra -->
    <div class="topbar-right">

      <!-- Scritta cliccabile per accedere -->
      <a href="/login.html" class="login-link">
        Login
      </a>

      <!-- Contenitore del menu a tendina -->
      <div class="dropdown">

        <!--
          Icona del menu rappresentata come hamburger stilizzato.

          Quando aria-expanded passa da false a true,
          il CSS trasforma l'hamburger in una X.
        -->
        <button
          id="menuButton"
          class="menu-button"
          type="button"
          aria-label="Apri il menu"
          aria-expanded="false"
        >
          <!-- Pane superiore -->
          <span class="burger-top"></span>

          <!-- Ripieno superiore -->
          <span class="burger-filling burger-lettuce"></span>

          <!-- Ripieno centrale -->
          <span class="burger-filling burger-meat"></span>

          <!-- Pane inferiore -->
          <span class="burger-bottom"></span>
        </button>

        <!-- Menu inizialmente nascosto -->
        <nav
          id="dropdownMenu"
          class="dropdown-menu hidden"
          aria-label="Menu principale"
        >
          <a href="/">Home</a>
          <a href="#italyMap">Regioni</a>
          <a href="#">Ristoranti</a>
          <a href="#">Preferiti</a>
          <a href="#">Chi siamo</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- =====================================================
       CONTENUTO PRINCIPALE
       ===================================================== -->
  <main class="home">
    <section class="map-section">

      <!-- Colonna sinistra -->
      <div class="map-information">
        <p class="section-label">
          Esplora l’Italia
        </p>

        <h1 id="mapTitle">
          Scegli una regione
        </h1>

        <p id="mapDescription">
          Clicca su una regione per visualizzarla più da vicino
          e scoprire i ristoranti aggiunti dagli utenti.
        </p>

        <!--
          Compare soltanto dopo la selezione
          di una regione.
        -->
        <button
          id="resetMapButton"
          class="reset-button hidden"
          type="button"
        >
          Torna alla mappa completa
        </button>

        <!--
          Contiene l'elenco dei ristoranti
          della regione selezionata.
        -->
        <section
          id="restaurantsSection"
          class="restaurants-section hidden"
          aria-live="polite"
        >
          <h2 id="restaurantsTitle">
            Ristoranti
          </h2>

          <!--
            JavaScript inserirà qui
            le schede dei ristoranti.
          -->
          <div
            id="restaurantsList"
            class="restaurants-list"
          ></div>
        </section>
      </div>

      <!-- Colonna destra con la mappa -->
      <div class="map-panel">
        <div
          id="italyMap"
          aria-label="Mappa interattiva delle regioni italiane"
        ></div>

        <!-- Messaggio mostrato in caso di errore -->
        <div
          id="mapError"
          class="map-error hidden"
        ></div>
      </div>
    </section>
  </main>

  <!-- Libreria JavaScript Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* =====================================================
       MENU A TENDINA
       ===================================================== */

    // Recupera il pulsante del menu.
    const menuButton =
      document.getElementById("menuButton");

    // Recupera il menu a tendina.
    const dropdownMenu =
      document.getElementById("dropdownMenu");

    /*
      Apre o chiude il menu quando l'utente
      preme l'icona hamburger.
    */
    menuButton.addEventListener("click", function (event) {
      /*
        Impedisce che il clic venga rilevato
        anche dal document nello stesso momento.
      */
      event.stopPropagation();

      // Controlla se il menu è attualmente chiuso.
      const menuIsClosed =
        dropdownMenu.classList.contains("hidden");

      // Apre oppure chiude il menu.
      dropdownMenu.classList.toggle("hidden");

      /*
        Aggiorna aria-expanded.

        Il CSS usa questo attributo anche per
        trasformare l'hamburger in una X.
      */
      menuButton.setAttribute(
        "aria-expanded",
        String(menuIsClosed)
      );
    });

    /*
      Chiude il menu cliccando in un punto
      esterno al menu stesso.
    */
    document.addEventListener("click", function (event) {
      const clickInsideMenu =
        dropdownMenu.contains(event.target);

      const clickOnButton =
        menuButton.contains(event.target);

      if (!clickInsideMenu && !clickOnButton) {
        dropdownMenu.classList.add("hidden");

        menuButton.setAttribute(
          "aria-expanded",
          "false"
        );
      }
    });

    /*
      Chiude il menu premendo il tasto Escape.
    */
    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        dropdownMenu.classList.add("hidden");

        menuButton.setAttribute(
          "aria-expanded",
          "false"
        );
      }
    });


    /* =====================================================
       ELEMENTI DELLA PAGINA
       ===================================================== */

    const mapTitle =
      document.getElementById("mapTitle");

    const mapDescription =
      document.getElementById("mapDescription");

    const resetMapButton =
      document.getElementById("resetMapButton");

    const mapError =
      document.getElementById("mapError");

    const restaurantsSection =
      document.getElementById("restaurantsSection");

    const restaurantsTitle =
      document.getElementById("restaurantsTitle");

    const restaurantsList =
      document.getElementById("restaurantsList");


    /* =====================================================
       CREAZIONE DELLA MAPPA
       ===================================================== */

    /*
      Crea la mappa Leaflet.

      La mappa non può essere:
      - trascinata;
      - spostata con la tastiera;
      - ingrandita con la rotella;
      - ingrandita manualmente.
    */
    const map = L.map("italyMap", {
      zoomControl: false,
      attributionControl: false,
      dragging: false,
      scrollWheelZoom: false,
      doubleClickZoom: false,
      touchZoom: false,
      boxZoom: false,
      keyboard: false,
      tap: false
    });

    // Livello che contiene tutte le regioni italiane.
    let regionsLayer = null;

    // Regione attualmente selezionata.
    let selectedRegionLayer = null;

    // Confini completi dell'Italia.
    let completeMapBounds = null;

    /*
      Livello separato dedicato ai marker
      dei ristoranti.
    */
    const restaurantsMarkersLayer =
      L.layerGroup().addTo(map);


    /* =====================================================
       STILE DELLE REGIONI
       ===================================================== */

    // Stile normale delle regioni.
    function getDefaultStyle() {
      return {
        color: "#ffffff",
        weight: 1.5,
        fillColor: "#c61f2b",
        fillOpacity: 0.88
      };
    }

    // Stile della regione selezionata.
    function getSelectedStyle() {
      return {
        color: "#ffffff",
        weight: 3,
        fillColor: "#820000",
        fillOpacity: 1
      };
    }


    /* =====================================================
       NOMI DELLE REGIONI
       ===================================================== */

    /*
      Uniforma alcuni nomi regionali
      presenti nel GeoJSON.
    */
    function normalizeRegionName(regionName) {
      if (!regionName) {
        return "";
      }

      const cleanedName = String(regionName)
        .trim()
        .replace(/\s+/g, " ");

      const regionNamesMap = {
        "Valle d'Aosta/Vallée d'Aoste": "Valle d'Aosta",
        "Trentino-Alto Adige/Südtirol": "Trentino-Alto Adige",
        "Friuli-Venezia Giulia": "Friuli Venezia Giulia",
        "Emilia-Romagna": "Emilia Romagna"
      };

      return regionNamesMap[cleanedName] || cleanedName;
    }

    /*
      Cerca il nome della regione nelle proprietà
      presenti nel file GeoJSON.
    */
    function getRegionName(properties) {
      const possibleNames = [
        properties?.reg_name,
        properties?.REG_NAME,
        properties?.DEN_REG,
        properties?.den_reg,
        properties?.name,
        properties?.NAME_1,
        properties?.nome,
        properties?.Nome
      ];

      const rawRegionName =
        possibleNames.find(function (value) {
          return (
            typeof value === "string" &&
            value.trim() !== ""
          );
        });

      return normalizeRegionName(
        rawRegionName || "Regione"
      );
    }


    /* =====================================================
       CENTRATURA DELLA MAPPA
       ===================================================== */

    // Centra l'intera Italia nel riquadro.
    function centerCompleteMap() {
      if (!completeMapBounds) {
        return;
      }

      map.fitBounds(completeMapBounds, {
        padding: [35, 35],
        animate: true
      });
    }


    /* =====================================================
       SICUREZZA DEI TESTI
       ===================================================== */

    /*
      Evita che eventuali caratteri HTML
      nei dati vengano interpretati come codice.
    */
    function escapeHtml(value) {
      const temporaryElement =
        document.createElement("div");

      temporaryElement.textContent =
        value === null || value === undefined
          ? ""
          : String(value);

      return temporaryElement.innerHTML;
    }


    /* =====================================================
       MARKER DEI RISTORANTI
       ===================================================== */

    function addRestaurantMarker(restaurant) {
      /*
        Converte le coordinate ricevute da MySQL
        in valori numerici.
      */
      const latitude = Number(restaurant.latitude);
      const longitude = Number(restaurant.longitude);

      // Controlla che le coordinate siano valide.
      if (
        !Number.isFinite(latitude) ||
        !Number.isFinite(longitude)
      ) {
        console.warn(
          "Coordinate non valide:",
          restaurant
        );

        return;
      }

      // Crea un punto sulla mappa.
      const marker = L.circleMarker(
        [latitude, longitude],
        {
          radius: 9,
          color: "#ffffff",
          weight: 3,
          fillColor: "#171717",
          fillOpacity: 1
        }
      );

      // Crea il contenuto del popup.
      marker.bindPopup(`
        <div class="restaurant-popup">
          <strong>
            ${escapeHtml(restaurant.name)}
          </strong>

          <span>
            ${escapeHtml(restaurant.city)},
            ${escapeHtml(restaurant.region)}
          </span>

          <span>
            ${escapeHtml(restaurant.address)}
          </span>

          <span>
            ${escapeHtml(
              restaurant.cuisine ||
              "Tipo di cucina non indicato"
            )}
          </span>
        </div>
      `);

      /*
        Salva l'id del ristorante
        dentro il marker.
      */
      marker.restaurantId = restaurant.id;

      // Aggiunge il marker al livello.
      marker.addTo(restaurantsMarkersLayer);
    }


    /* =====================================================
       SCHEDE DEI RISTORANTI
       ===================================================== */

    function createRestaurantCard(restaurant) {
      // Crea il contenitore della scheda.
      const card =
        document.createElement("article");

      card.className = "restaurant-card";

      // Nome del ristorante.
      const name =
        document.createElement("h3");

      name.textContent = restaurant.name;

      // Città e regione.
      const location =
        document.createElement("p");

      location.className =
        "restaurant-location";

      location.textContent =
        restaurant.city +
        ", " +
        restaurant.region;

      // Indirizzo.
      const address =
        document.createElement("p");

      address.className =
        "restaurant-address";

      address.textContent =
        restaurant.address;

      // Tipo di cucina.
      const cuisine =
        document.createElement("span");

      cuisine.className =
        "restaurant-cuisine";

      cuisine.textContent =
        restaurant.cuisine ||
        "Tipo di cucina non indicato";

      // Inserisce gli elementi principali.
      card.append(
        name,
        location,
        address,
        cuisine
      );

      // Aggiunge la descrizione, se disponibile.
      if (restaurant.description) {
        const description =
          document.createElement("p");

        description.className =
          "restaurant-description";

        description.textContent =
          restaurant.description;

        card.appendChild(description);
      }

      /*
        Cliccando sulla scheda viene aperto
        il popup del marker corrispondente.
      */
      card.addEventListener("click", function () {
        restaurantsMarkersLayer.eachLayer(
          function (marker) {
            if (
              marker.restaurantId ===
              restaurant.id
            ) {
              marker.openPopup();
            }
          }
        );
      });

      return card;
    }


    /* =====================================================
       CARICAMENTO DEI RISTORANTI
       ===================================================== */

    async function loadRestaurants(regionName) {
      // Elimina i marker precedenti.
      restaurantsMarkersLayer.clearLayers();

      // Mostra la sezione dei ristoranti.
      restaurantsSection.classList.remove("hidden");

      // Aggiorna il titolo.
      restaurantsTitle.textContent =
        "Ristoranti in " + regionName;

      // Mostra il messaggio di caricamento.
      restaurantsList.innerHTML = `
        <p class="restaurants-message">
          Caricamento dei ristoranti...
        </p>
      `;

      try {
        /*
          Costruisce la richiesta al server.

          Esempio:
          /restaurants?region=Lazio
        */
        const requestUrl =
          "/restaurants?region=" +
          encodeURIComponent(regionName);

        const response =
          await fetch(requestUrl);

        if (!response.ok) {
          throw new Error(
            "Il server ha restituito lo stato " +
            response.status
          );
        }

        const restaurants =
          await response.json();

        // Elimina il messaggio di caricamento.
        restaurantsList.innerHTML = "";

        // Controlla che la risposta sia un array.
        if (!Array.isArray(restaurants)) {
          throw new Error(
            "La risposta del server non è un elenco."
          );
        }

        // Nessun ristorante trovato.
        if (restaurants.length === 0) {
          restaurantsList.innerHTML = `
            <p class="restaurants-message">
              Non sono ancora presenti ristoranti
              in questa regione.
            </p>
          `;

          return;
        }

        /*
          Crea marker e scheda
          per ogni ristorante.
        */
        restaurants.forEach(function (restaurant) {
          addRestaurantMarker(restaurant);

          const restaurantCard =
            createRestaurantCard(restaurant);

          restaurantsList.appendChild(
            restaurantCard
          );
        });
      } catch (error) {
        console.error(
          "Errore caricamento ristoranti:",
          error
        );

        restaurantsList.innerHTML = `
          <p class="restaurants-message restaurants-error">
            Non è stato possibile caricare i ristoranti.
          </p>
        `;
      }
    }


    /* =====================================================
       SELEZIONE DELLA REGIONE
       ===================================================== */

    function selectRegion(feature, layer) {
      // Ripristina la regione precedente.
      if (
        selectedRegionLayer &&
        regionsLayer
      ) {
        regionsLayer.resetStyle(
          selectedRegionLayer
        );
      }

      // Salva la nuova regione selezionata.
      selectedRegionLayer = layer;

      // Evidenzia la regione.
      selectedRegionLayer.setStyle(
        getSelectedStyle()
      );

      selectedRegionLayer.bringToFront();

      // Recupera il nome.
      const regionName =
        getRegionName(feature.properties);

      // Esegue lo zoom automatico.
      map.fitBounds(layer.getBounds(), {
        padding: [55, 55],
        maxZoom: 8,
        animate: true
      });

      // Aggiorna titolo e descrizione.
      mapTitle.textContent =
        regionName;

      mapDescription.textContent =
        "Stai visualizzando la regione " +
        regionName +
        ".";

      // Mostra il pulsante di ritorno.
      resetMapButton.classList.remove(
        "hidden"
      );

      // Carica i ristoranti.
      loadRestaurants(regionName);
    }


    /* =====================================================
       EVENTI DELLE REGIONI
       ===================================================== */

    function onEachRegion(feature, layer) {
      const regionName =
        getRegionName(feature.properties);

      // Mostra il nome della regione al passaggio.
      layer.bindTooltip(regionName, {
        sticky: true,
        direction: "top",
        className: "region-tooltip"
      });

      layer.on({
        // Evidenzia la regione.
        mouseover: function (event) {
          if (
            event.target !==
            selectedRegionLayer
          ) {
            event.target.setStyle({
              fillColor: "#e44c55",
              fillOpacity: 1
            });
          }
        },

        // Ripristina il colore.
        mouseout: function (event) {
          if (
            event.target !==
              selectedRegionLayer &&
            regionsLayer
          ) {
            regionsLayer.resetStyle(
              event.target
            );
          }
        },

        // Seleziona la regione.
        click: function () {
          selectRegion(feature, layer);
        }
      });
    }


    /* =====================================================
       RIPRISTINO DELLA MAPPA
       ===================================================== */

    function resetMap() {
      if (!regionsLayer) {
        return;
      }

      // Ripristina la regione selezionata.
      if (selectedRegionLayer) {
        regionsLayer.resetStyle(
          selectedRegionLayer
        );

        selectedRegionLayer = null;
      }

      // Elimina i marker.
      restaurantsMarkersLayer.clearLayers();

      // Nasconde la sezione dei ristoranti.
      restaurantsSection.classList.add(
        "hidden"
      );

      restaurantsList.innerHTML = "";

      // Ricentra l'Italia.
      centerCompleteMap();

      // Ripristina i testi.
      mapTitle.textContent =
        "Scegli una regione";

      mapDescription.textContent =
        "Clicca su una regione per visualizzarla più da vicino " +
        "e scoprire i ristoranti aggiunti dagli utenti.";

      resetMapButton.classList.add(
        "hidden"
      );
    }


    /* =====================================================
       CARICAMENTO DEL GEOJSON
       ===================================================== */

    async function loadRegions() {
      try {
        const response =
          await fetch("italy-regions.geojson");

        if (!response.ok) {
          throw new Error(
            "Errore HTTP " + response.status
          );
        }

        const geojson =
          await response.json();

        // Controlla che il file contenga le regioni.
        if (
          !geojson.features ||
          !Array.isArray(geojson.features) ||
          geojson.features.length < 20
        ) {
          throw new Error(
            "Il file GeoJSON non contiene " +
            "le 20 regioni italiane."
          );
        }

        // Inserisce le regioni nella mappa.
        regionsLayer = L.geoJSON(
          geojson,
          {
            style: getDefaultStyle,
            onEachFeature: onEachRegion
          }
        ).addTo(map);

        // Salva i confini completi.
        completeMapBounds =
          regionsLayer.getBounds();

        // Centra la mappa.
        centerCompleteMap();

        /*
          Fa ricalcolare a Leaflet
          le dimensioni del contenitore.
        */
        setTimeout(function () {
          map.invalidateSize();
          centerCompleteMap();
        }, 100);
      } catch (error) {
        console.error(
          "Errore caricamento mappa:",
          error
        );

        document
          .getElementById("italyMap")
          .classList.add("hidden");

        mapError.textContent =
          "Non è stato possibile caricare la mappa. " +
          "Controlla che italy-regions.geojson " +
          "sia dentro la cartella public.";

        mapError.classList.remove("hidden");
      }
    }


    /* =====================================================
       AVVIO
       ===================================================== */

    // Collega il pulsante alla funzione di reset.
    resetMapButton.addEventListener(
      "click",
      resetMap
    );

    // Mantiene la mappa centrata al ridimensionamento.
    window.addEventListener(
      "resize",
      function () {
        map.invalidateSize();

        if (!selectedRegionLayer) {
          centerCompleteMap();
        }
      }
    );

    // Carica le regioni all'apertura della pagina.
    loadRegions();
  </script>
</body>
</html>
