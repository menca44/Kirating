<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>KiRating | Mappa ristoranti</title>

  <!-- Font Awesome per le icone -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />

  <!-- Leaflet per la mappa -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;

      background-color: #f7f2ec;
      color: #2b2118;

      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    input,
    select {
      font-family:
        Arial,
        Helvetica,
        sans-serif;
    }

    /* =====================================================
       NAVBAR
       ===================================================== */

    .navbar {
      min-height: 78px;
      padding: 12px 26px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;

      position: sticky;
      top: 0;
      z-index: 1000;

      background-color: #b40000;
      color: #ffffff;

      box-shadow:
        0 10px 28px
        rgba(0, 0, 0, 0.22);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-logo-full {
  width: 168px;
  height: 58px;

  display: block;

  border-radius: 12px;

  object-fit: contain;

  background-color: #ffffff;
}

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .navbar-link {
      padding: 10px 14px;

      display: inline-flex;
      align-items: center;
      gap: 8px;

      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;

      background-color: rgba(255, 255, 255, 0.12);

      font-size: 13px;
      font-weight: 800;

      transition:
        background-color 0.2s ease,
        transform 0.2s ease;
    }

    .navbar-link:hover {
      background-color: rgba(255, 255, 255, 0.22);

      transform: translateY(-1px);
    }

    .menu-wrapper {
      position: relative;
    }

    .menu-button {
      width: 43px;
      height: 43px;

      display: inline-flex;
      align-items: center;
      justify-content: center;

      border: 1px solid rgba(255, 255, 255, 0.32);
      border-radius: 50%;

      background-color: rgba(255, 255, 255, 0.13);
      color: #ffffff;

      font-size: 18px;

      cursor: pointer;
    }

    .menu-panel {
      width: 230px;
      padding: 9px;

      display: none;

      position: absolute;
      top: calc(100% + 12px);
      right: 0;
      z-index: 1100;

      border: 1px solid rgba(72, 54, 38, 0.10);
      border-radius: 17px;

      background-color: #ffffff;
      color: #2b2118;

      box-shadow:
        0 18px 45px
        rgba(0, 0, 0, 0.20);
    }

    .menu-panel.open {
      display: block;
    }

    .menu-panel a {
      padding: 12px 12px;

      display: flex;
      align-items: center;
      gap: 10px;

      border-radius: 11px;

      color: #3d3027;

      font-size: 14px;
      font-weight: 800;
    }

    .menu-panel a:hover {
      background-color: #f7f2ec;
      color: #b40000;
    }

    /* =====================================================
       CATEGORIE
       ===================================================== */

    .categories-bar {
      padding: 14px 24px;

      display: flex;
      gap: 10px;

      overflow-x: auto;

      background-color: #ffffff;

      box-shadow:
        0 8px 22px
        rgba(0, 0, 0, 0.07);
    }

    .category-button {
      padding: 10px 13px;

      display: inline-flex;
      align-items: center;
      gap: 8px;

      border: 1px solid #eadfd6;
      border-radius: 999px;

      background-color: #ffffff;
      color: #5f574e;

      font-size: 13px;
      font-weight: 850;

      white-space: nowrap;

      cursor: pointer;

      transition:
        background-color 0.2s ease,
        border-color 0.2s ease,
        color 0.2s ease,
        transform 0.2s ease;
    }

    .category-button:hover,
    .category-button.active {
      border-color: #b40000;

      background-color: #b40000;
      color: #ffffff;

      transform: translateY(-1px);
    }

    /* =====================================================
       LAYOUT
       ===================================================== */

    .main-layout {
      height: calc(100vh - 146px);

      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
    }

    .sidebar {
      padding: 20px;

      overflow-y: auto;

      border-right: 1px solid #eadfd6;

      background-color: #fffaf5;
    }

    .sidebar-card {
      margin-bottom: 18px;
      padding: 18px;

      border: 1px solid rgba(72, 54, 38, 0.08);
      border-radius: 18px;

      background-color: #ffffff;

      box-shadow:
        0 12px 28px
        rgba(38, 27, 18, 0.08);
    }

    .sidebar-card h2 {
      margin-bottom: 10px;

      color: #b40000;

      font-size: 19px;
      font-weight: 900;
    }

    .sidebar-card p {
      margin-bottom: 12px;

      color: #746f68;

      font-size: 13px;
      line-height: 1.45;
    }

    .form-group {
      margin-bottom: 12px;

      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .form-group label {
      color: #3b3028;

      font-size: 12px;
      font-weight: 900;
    }

    .form-group input,
    .form-group select {
      min-height: 42px;
      padding: 10px 11px;

      border: 1px solid #ded7cf;
      border-radius: 10px;

      background-color: #ffffff;
      color: #2b2118;

      font-size: 13px;

      outline: none;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #b40000;

      box-shadow:
        0 0 0 3px
        rgba(180, 0, 0, 0.10);
    }

    .primary-button {
      width: 100%;
      min-height: 44px;
      padding: 11px 14px;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      border: none;
      border-radius: 999px;

      background-color: #b40000;
      color: #ffffff;

      font-size: 13px;
      font-weight: 900;

      cursor: pointer;

      box-shadow:
        0 10px 22px
        rgba(180, 0, 0, 0.22);

      transition:
        background-color 0.2s ease,
        transform 0.2s ease,
        opacity 0.2s ease;
    }

    .primary-button:hover {
      background-color: #8f0000;

      transform: translateY(-1px);
    }

    .primary-button:disabled {
      opacity: 0.65;

      cursor: wait;
      transform: none;
    }

    .secondary-button {
      width: 100%;
      min-height: 40px;
      padding: 10px 13px;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;

      border: 1px solid #b40000;
      border-radius: 999px;

      background-color: #ffffff;
      color: #b40000;

      font-size: 13px;
      font-weight: 900;

      cursor: pointer;
    }

    .secondary-button:hover {
      background-color: #b40000;
      color: #ffffff;
    }

    .regions-list {
      display: grid;
      gap: 8px;
    }

    .region-button {
      padding: 11px 12px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;

      border: 1px solid #eadfd6;
      border-radius: 12px;

      background-color: #ffffff;
      color: #4f473f;

      font-size: 13px;
      font-weight: 850;

      cursor: pointer;

      transition:
        background-color 0.2s ease,
        color 0.2s ease,
        border-color 0.2s ease;
    }

    .region-button:hover,
    .region-button.active {
      border-color: #b40000;

      background-color: #b40000;
      color: #ffffff;
    }

    .restaurant-list {
      display: grid;
      gap: 10px;
    }

    .restaurant-list-item {
      padding: 13px;

      border: 1px solid #eadfd6;
      border-radius: 14px;

      background-color: #ffffff;

      cursor: pointer;

      transition:
        border-color 0.2s ease,
        transform 0.2s ease,
        box-shadow 0.2s ease;
    }

    .restaurant-list-item:hover {
      border-color: #b40000;

      transform: translateY(-1px);

      box-shadow:
        0 10px 24px
        rgba(38, 27, 18, 0.10);
    }

    .restaurant-list-item h3 {
      margin-bottom: 5px;

      color: #2b2118;

      font-size: 15px;
      font-weight: 900;
    }

    .restaurant-list-item p {
      margin: 3px 0;

      color: #746f68;

      font-size: 12px;
      line-height: 1.35;
    }

    .list-rating {
      margin-top: 8px;

      display: inline-flex;
      align-items: center;
      gap: 5px;

      color: #b40000;

      font-size: 12px;
      font-weight: 900;
    }

    .list-rating i {
      color: #f0a400;
    }

    .map-wrapper {
      position: relative;

      min-width: 0;
      min-height: 0;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .map-message {
      max-width: 340px;
      padding: 12px 14px;

      display: none;

      position: absolute;
      top: 18px;
      left: 18px;
      z-index: 700;

      border-radius: 13px;

      background-color: #ffffff;
      color: #3b3028;

      font-size: 13px;
      font-weight: 800;
      line-height: 1.4;

      box-shadow:
        0 12px 30px
        rgba(0, 0, 0, 0.16);
    }

    .map-message.show {
      display: block;
    }

    .map-message.error {
      border-left: 4px solid #b40000;
    }

    .map-message.success {
      border-left: 4px solid #2c7a3f;
    }

    /* =====================================================
       POPUP MAPPA
       ===================================================== */

    .restaurant-popup {
      min-width: 220px;
    }

    .restaurant-popup h3 {
      margin: 0 0 8px;

      color: #2b2118;

      font-size: 16px;
      font-weight: 900;
    }

    .popup-rating {
      margin: 0 0 8px;

      display: flex;
      align-items: center;
      gap: 6px;

      color: #b40000;

      font-size: 14px;
      font-weight: 900;
    }

    .popup-rating i {
      color: #f0a400;
    }

    .popup-rating span {
      color: #746f68;

      font-size: 12px;
      font-weight: 800;
    }

    .popup-rating.no-rating {
      color: #8a8178;
    }

    .popup-rating.no-rating i {
      color: #b8b0a8;
    }

    .popup-address,
    .popup-cuisine,
    .popup-distance,
    .popup-description {
      margin: 6px 0;

      color: #5f574e;

      font-size: 13px;
      line-height: 1.35;
    }

    .popup-address i,
    .popup-cuisine i,
    .popup-distance i {
      width: 15px;

      color: #b40000;
    }

    .popup-description {
      color: #746f68;
    }

    .popup-actions {
      margin-top: 10px;

      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .popup-details-link,
    .popup-review-link {
      padding: 9px 12px;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;

      border-radius: 999px;

      font-size: 12px;
      font-weight: 900;
      text-decoration: none;
    }

    .popup-details-link {
      background-color: #b40000;
      color: #ffffff !important;
    }

    .popup-details-link:hover {
      background-color: #8f0000;
    }

    .popup-review-link {
      border: 1px solid #b40000;

      background-color: #ffffff;
      color: #b40000 !important;
    }

    .popup-review-link:hover {
      background-color: #b40000;
      color: #ffffff !important;
    }

    .leaflet-popup-content {
      margin: 14px;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 16px;
    }

    /* =====================================================
       RESPONSIVE
       ===================================================== */

    @media (max-width: 950px) {
      .main-layout {
        height: auto;

        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: none;

        border-right: none;
        border-bottom: 1px solid #eadfd6;
      }

      .map-wrapper {
        height: 70vh;
      }
    }

    @media (max-width: 650px) {
      .navbar {
        padding: 11px 14px;
      }

      .brand-logo-full {
  width: 138px;
  height: 50px;
}

      .navbar-link span {
        display: none;
      }

      .categories-bar {
        padding: 12px 14px;
      }

      .sidebar {
        padding: 14px;
      }

      .map-wrapper {
        height: 68vh;
      }
    }
  </style>
</head>

<body>
  <header class="navbar">
    <a
  class="brand"
  href="/"
  aria-label="Vai alla home di KiRating"
>
  <img
    class="brand-logo-full"
    src="/logo-kira.jpeg"
    alt="KiRating"
  />
</a>

    <div class="navbar-actions">
      <a
        class="navbar-link"
        href="/recensioni.html"
      >
        <i class="fa-solid fa-pen"></i>
        <span>Scrivi recensione</span>
      </a>

      <a
        class="navbar-link"
        href="/login.html"
      >
        <i class="fa-solid fa-user"></i>
        <span>Login</span>
      </a>

      <div class="menu-wrapper">
        <button
          id="menuButton"
          class="menu-button"
          type="button"
          aria-label="Apri menu"
        >
          <i class="fa-solid fa-bars"></i>
        </button>

        <nav
          id="menuPanel"
          class="menu-panel"
        >
          <a href="/">
            <i class="fa-solid fa-house"></i>
            Home
          </a>

          <a href="#map">
            <i class="fa-solid fa-map-location-dot"></i>
            Mappa
          </a>

          <a href="/recensioni.html">
            <i class="fa-solid fa-pen-to-square"></i>
            Recensioni
          </a>

          <a href="#">
            <i class="fa-solid fa-heart"></i>
            Preferiti
          </a>

          <a href="#">
            <i class="fa-solid fa-circle-info"></i>
            Chi siamo
          </a>
        </nav>
      </div>
    </div>
  </header>

  <section
    class="categories-bar"
    aria-label="Categorie ristoranti"
  >
    <button
      class="category-button active"
      type="button"
      data-category="tutti"
    >
      <i class="fa-solid fa-border-all"></i>
      Tutti
    </button>

    <button
      class="category-button"
      type="button"
      data-category="italiano"
    >
      <i class="fa-solid fa-utensils"></i>
      Italiano
    </button>

    <button
      class="category-button"
      type="button"
      data-category="pizza"
    >
      <i class="fa-solid fa-pizza-slice"></i>
      Pizza
    </button>

    <button
      class="category-button"
      type="button"
      data-category="sushi"
    >
      <i class="fa-solid fa-fish"></i>
      Sushi
    </button>

    <button
      class="category-button"
      type="button"
      data-category="pesce"
    >
      <i class="fa-solid fa-shrimp"></i>
      Pesce
    </button>

    <button
      class="category-button"
      type="button"
      data-category="carne"
    >
      <i class="fa-solid fa-drumstick-bite"></i>
      Carne
    </button>

    <button
      class="category-button"
      type="button"
      data-category="gourmet"
    >
      <i class="fa-solid fa-wand-magic-sparkles"></i>
      Gourmet
    </button>

    <button
      class="category-button"
      type="button"
      data-category="fast food"
    >
      <i class="fa-solid fa-burger"></i>
      Fast food
    </button>

    <button
      class="category-button"
      type="button"
      data-category="poke"
    >
      <i class="fa-solid fa-bowl-food"></i>
      Poke
    </button>

    <button
      class="category-button"
      type="button"
      data-category="vegetariano"
    >
      <i class="fa-solid fa-leaf"></i>
      Vegetariano
    </button>

    <button
      class="category-button"
      type="button"
      data-category="dolci"
    >
      <i class="fa-solid fa-ice-cream"></i>
      Dolci
    </button>
  </section>

  <main class="main-layout">
    <aside class="sidebar">
      <section class="sidebar-card">
        <h2>
          Cerca nei dintorni
        </h2>

        <p>
          Inserisci una città o un indirizzo e scegli il raggio di ricerca.
        </p>

        <div class="form-group">
          <label for="nearbySearchInput">
            Posizione
          </label>

          <input
            id="nearbySearchInput"
            type="text"
            placeholder="Es. Taranto, Puglia"
          />
        </div>

        <div class="form-group">
          <label for="radiusSelect">
            Raggio
          </label>

          <select id="radiusSelect">
            <option value="5">5 km</option>
            <option value="10" selected>10 km</option>
            <option value="25">25 km</option>
            <option value="50">50 km</option>
          </select>
        </div>

        <button
          id="nearbySearchButton"
          class="primary-button"
          type="button"
        >
          <i class="fa-solid fa-location-crosshairs"></i>
          Cerca ristoranti vicini
        </button>

        <button
          id="resetSearchButton"
          class="secondary-button"
          type="button"
          style="margin-top: 10px;"
        >
          <i class="fa-solid fa-rotate-left"></i>
          Mostra tutti
        </button>
      </section>

      <section class="sidebar-card">
        <h2>
          Regioni
        </h2>

        <p>
          Clicca su una regione per centrare la mappa e filtrare i ristoranti.
        </p>

        <div
          id="regionsList"
          class="regions-list"
        ></div>
      </section>

      <section class="sidebar-card">
        <h2>
          Ristoranti visualizzati
        </h2>

        <p id="restaurantCountText">
          Caricamento ristoranti...
        </p>

        <div
          id="restaurantList"
          class="restaurant-list"
        ></div>
      </section>
    </aside>

    <section class="map-wrapper">
      <div
        id="mapMessage"
        class="map-message"
      ></div>

      <div id="map"></div>
    </section>
  </main>

  <!-- Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    // =====================================================
    // ELEMENTI DELLA PAGINA
    // =====================================================

    const menuButton =
      document.getElementById("menuButton");

    const menuPanel =
      document.getElementById("menuPanel");

    const categoryButtons =
      document.querySelectorAll(".category-button");

    const nearbySearchInput =
      document.getElementById("nearbySearchInput");

    const radiusSelect =
      document.getElementById("radiusSelect");

    const nearbySearchButton =
      document.getElementById("nearbySearchButton");

    const resetSearchButton =
      document.getElementById("resetSearchButton");

    const regionsList =
      document.getElementById("regionsList");

    const restaurantList =

    const restaurantCountText =
      document.getElementById("restaurantCountText");

    const mapMessage =

        maxZoom: 19,

      {
        name: "Umbria",
        center: [43.1107, 12.3908],
        zoom: 8
      },
      {
        name: "Valle d'Aosta",
        center: [45.7370, 7.3201],
        zoom: 9
      },
      {
        name: "Veneto",
        center: [45.4408, 12.3155],
        zoom: 8
      }
    ];

    // =====================================================
    // MENU
    // =====================================================

    menuButton.addEventListener(
      "click",
      function () {
        menuPanel.classList.toggle("open");
      }
    );

    document.addEventListener(
      "click",
      function (event) {
        const clickedInsideMenu =
          menuPanel.contains(event.target) ||
          menuButton.contains(event.target);

        if (!clickedInsideMenu) {
          menuPanel.classList.remove("open");
        }
      }
    );

    // =====================================================
    // MESSAGGI MAPPA
    // =====================================================

    function showMapMessage(message, type) {
      mapMessage.textContent = message;

      mapMessage.classList.remove(
        "show",
        "success",
        "error"
      );

      mapMessage.classList.add(
        "show",
        type
      );

      setTimeout(function () {
        mapMessage.classList.remove("show");
      }, 4200);
    }

    // =====================================================
    // VALUTAZIONI
    // =====================================================

    function formatReviewsCount(count) {
      const reviewsCount =
        Number(count || 0);

      if (reviewsCount === 1) {
        return "1 recensione";
      }

      return reviewsCount + " recensioni";
    }

    function buildRatingHtml(restaurant) {
      const reviewsCount =
        Number(restaurant.reviews_count || 0);

      const averageOverallRating =
        restaurant.average_overall_rating === null ||
        restaurant.average_overall_rating === undefined
          ? null
          : Number(restaurant.average_overall_rating);

      if (
        reviewsCount === 0 ||
        averageOverallRating === null ||
        Number.isNaN(averageOverallRating)
      ) {
        return `
          <p class="popup-rating no-rating">
            <i class="fa-regular fa-star"></i>
            Nessuna recensione
          </p>
        `;
      }

      return `
        <p class="popup-rating">
          <i class="fa-solid fa-star"></i>
          ${averageOverallRating.toFixed(1)}/5
          <span>
            (${formatReviewsCount(reviewsCount)})
          </span>
        </p>
      `;
    }

    function buildListRatingHtml(restaurant) {
      const reviewsCount =
        Number(restaurant.reviews_count || 0);

      const averageOverallRating =
        restaurant.average_overall_rating === null ||
        restaurant.average_overall_rating === undefined
          ? null
          : Number(restaurant.average_overall_rating);

      if (
        reviewsCount === 0 ||
        averageOverallRating === null ||
        Number.isNaN(averageOverallRating)
      ) {
        return `
          <span class="list-rating">
            <i class="fa-regular fa-star"></i>
            Nessuna recensione
          </span>
        `;
      }

      return `
        <span class="list-rating">
          <i class="fa-solid fa-star"></i>
          ${averageOverallRating.toFixed(1)}/5
          (${reviewsCount})
        </span>
      `;
    }

    // =====================================================
    // POPUP RISTORANTE
    // =====================================================

    function buildRestaurantPopup(restaurant) {
      const ratingHtml =
        buildRatingHtml(restaurant);

      const distanceHtml =
        restaurant.distance_km !== undefined &&
        restaurant.distance_km !== null
          ? `
            <p class="popup-distance">
              <i class="fa-solid fa-location-arrow"></i>
              A ${Number(restaurant.distance_km).toFixed(2)} km da te
            </p>
          `
          : "";

      const cuisineHtml =
        restaurant.cuisine
          ? `
            <p class="popup-cuisine">
              <i class="fa-solid fa-utensils"></i>
              ${restaurant.cuisine}
            </p>
          `
          : "";

      const descriptionHtml =
        restaurant.description
          ? `
            <p class="popup-description">
              ${restaurant.description}
            </p>
          `
          : "";

      return `
        <div class="restaurant-popup">
          <h3>
            ${restaurant.name}
          </h3>

          ${ratingHtml}

          <p class="popup-address">
            <i class="fa-solid fa-location-dot"></i>
            ${restaurant.address}, ${restaurant.city}, ${restaurant.region}
          </p>

          ${cuisineHtml}

          ${distanceHtml}

          ${descriptionHtml}

          <div class="popup-actions">
            <a
              class="popup-details-link"
              href="/ristorante.html?id=${encodeURIComponent(restaurant.id)}"
            >
              <i class="fa-solid fa-eye"></i>
              Vedi ristorante
            </a>

            <a
              class="popup-review-link"
              href="/recensioni.html?restaurantId=${encodeURIComponent(restaurant.id)}"
            >
              <i class="fa-solid fa-pen"></i>
              Recensisci
            </a>
          </div>
        </div>
      `;
    }

    // =====================================================
    // RENDER MARKER
    // =====================================================

    function clearMarkers() {
      restaurantMarkers.forEach(function (marker) {
        map.removeLayer(marker);
      });

      restaurantMarkers = [];
    }

    function renderMarkers(restaurants) {
      clearMarkers();

      restaurants.forEach(function (restaurant) {
        const latitude =
          Number(restaurant.latitude);

        const longitude =
          Number(restaurant.longitude);

        if (
          !Number.isFinite(latitude) ||
          !Number.isFinite(longitude)
        ) {
          return;
        }

        const marker =
          L.marker(
            [latitude, longitude],
            {
              icon: defaultIcon
            }
          ).addTo(map);

        marker.bindPopup(
          buildRestaurantPopup(restaurant)
        );

        marker.restaurantId =
          restaurant.id;

        restaurantMarkers.push(marker);
      });
    }

    function focusRestaurant(restaurantId) {
      const restaurant =
        visibleRestaurants.find(function (item) {
          return Number(item.id) === Number(restaurantId);
        });

      if (!restaurant) {
        return;
      }

      const latitude =
        Number(restaurant.latitude);

      const longitude =
        Number(restaurant.longitude);

      if (
        !Number.isFinite(latitude) ||
        !Number.isFinite(longitude)
      ) {
        return;
      }

      map.setView(
        [latitude, longitude],
        17
      );

      const marker =
        restaurantMarkers.find(function (item) {
          return Number(item.restaurantId) === Number(restaurantId);
        });

      if (marker) {
        marker.openPopup();
      }
    }

    // =====================================================
    // LISTA RISTORANTI
    // =====================================================

    function renderRestaurantList(restaurants) {
      restaurantList.innerHTML = "";

      if (restaurants.length === 0) {
        restaurantCountText.textContent =
          "Nessun ristorante trovato.";

        restaurantList.innerHTML = `
          <p style="color:#746f68; font-size:13px; line-height:1.45;">
            Non ci sono ristoranti da mostrare con questi filtri.
          </p>
        `;

        return;
      }

      restaurantCountText.textContent =
        restaurants.length === 1
          ? "1 ristorante visualizzato."
          : restaurants.length + " ristoranti visualizzati.";

      restaurants.forEach(function (restaurant) {
        const listItem =
          document.createElement("article");

        listItem.className =
          "restaurant-list-item";

        const distanceHtml =
          restaurant.distance_km !== undefined &&
          restaurant.distance_km !== null
            ? `
              <p>
                <i class="fa-solid fa-location-arrow"></i>
                ${Number(restaurant.distance_km).toFixed(2)} km
              </p>
            `
            : "";

        listItem.innerHTML = `
          <h3>
            ${restaurant.name}
          </h3>

          <p>
            ${restaurant.city}, ${restaurant.region}
          </p>

          <p>
            ${restaurant.address}
          </p>

          ${
            restaurant.cuisine
              ? `<p>${restaurant.cuisine}</p>`
              : ""
          }

          ${distanceHtml}

          ${buildListRatingHtml(restaurant)}
        `;

        listItem.addEventListener(
          "click",
          function () {
            focusRestaurant(restaurant.id);
          }
        );

        restaurantList.appendChild(listItem);
      });
    }

    // =====================================================
    // FILTRI
    // =====================================================

    function restaurantMatchesCategory(restaurant) {
      if (selectedCategory === "tutti") {
        return true;
      }

      const searchableText =
        [
          restaurant.name,
          restaurant.cuisine,
          restaurant.description
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

      return searchableText.includes(
        selectedCategory.toLowerCase()
      );
    }

    function applyFilters() {
      visibleRestaurants =
        allRestaurants.filter(function (restaurant) {
          const matchesRegion =
            !selectedRegion ||
            restaurant.region.toLowerCase() === selectedRegion.toLowerCase();

          const matchesCategory =
            restaurantMatchesCategory(restaurant);

          return matchesRegion && matchesCategory;
        });

      renderMarkers(visibleRestaurants);
      renderRestaurantList(visibleRestaurants);
    }

    // =====================================================
    // REGIONI
    // =====================================================

    function renderRegions() {
      regionsList.innerHTML = "";

      const allButton =
        document.createElement("button");

      allButton.className =
        "region-button active";

      allButton.type =
        "button";

      allButton.dataset.region =
        "";

      allButton.innerHTML = `
        <span>Tutte le regioni</span>
        <i class="fa-solid fa-earth-europe"></i>
      `;

      regionsList.appendChild(allButton);

      regions.forEach(function (region) {
        const button =
          document.createElement("button");

        button.className =
          "region-button";

        button.type =
          "button";

        button.dataset.region =
          region.name;

        button.innerHTML = `
          <span>${region.name}</span>
          <i class="fa-solid fa-chevron-right"></i>
        `;

        regionsList.appendChild(button);
      });
    }

    function setActiveRegionButton(regionName) {
      const buttons =
        document.querySelectorAll(".region-button");

      buttons.forEach(function (button) {
        const isActive =
          button.dataset.region === regionName;

        button.classList.toggle(
          "active",
          isActive
        );
      });
    }

    regionsList.addEventListener(
      "click",
      function (event) {
        const button =
          event.target.closest(".region-button");

        if (!button) {
          return;
        }

        selectedRegion =
          button.dataset.region || "";

        setActiveRegionButton(selectedRegion);

        if (selectedRegion) {
          const region =
            regions.find(function (item) {
              return item.name === selectedRegion;
            });

          if (region) {
            map.setView(
              region.center,
              region.zoom
            );
          }
        } else {
          map.setView(
            [41.8719, 12.5674],
            6
          );
        }

        applyFilters();
      }
    );

    // =====================================================
    // CATEGORIE
    // =====================================================

    categoryButtons.forEach(function (button) {
      button.addEventListener(
        "click",
        function () {
          categoryButtons.forEach(function (item) {
            item.classList.remove("active");
          });

          button.classList.add("active");

          selectedCategory =
            button.dataset.category || "tutti";

          applyFilters();
        }
      );
    });

    // =====================================================
    // CARICAMENTO RISTORANTI
    // =====================================================

    async function loadRestaurants() {
      try {
        const response =
          await fetch("/restaurants");

        if (!response.ok) {
          throw new Error(
            "Errore HTTP " + response.status
          );
        }

        const restaurants =
          await response.json();

        allRestaurants =
          Array.isArray(restaurants)
            ? restaurants
            : [];

        applyFilters();
      } catch (error) {
        console.error(
          "Errore durante il caricamento dei ristoranti:",
          error
        );

        showMapMessage(
          "Non è stato possibile caricare i ristoranti.",
          "error"
        );

        restaurantCountText.textContent =
          "Errore durante il caricamento.";
      }
    }

    // =====================================================
    // RICERCA NEI DINTORNI
    // =====================================================

    async function searchNearbyRestaurants() {
      const query =
        nearbySearchInput.value.trim();

      const radius =
        radiusSelect.value;

      if (query.length < 3) {
        showMapMessage(
          "Inserisci una posizione di almeno 3 caratteri.",
          "error"
        );

        return;
      }

      nearbySearchButton.disabled = true;

      nearbySearchButton.innerHTML =
        '<i class="fa-solid fa-spinner fa-spin"></i> Ricerca...';

      try {
        const geocodeResponse =
          await fetch(
            "/geocode?q=" +
              encodeURIComponent(query)
          );

        const geocodeData =
          await geocodeResponse.json();

        if (
          !geocodeResponse.ok ||
          !geocodeData.success ||
          !geocodeData.location
        ) {
          showMapMessage(
            geocodeData.message ||
              "Posizione non trovata.",
            "error"
          );

          return;
        }

        const latitude =
          Number(geocodeData.location.latitude);

        const longitude =
          Number(geocodeData.location.longitude);

        const restaurantsResponse =
          await fetch(
            "/restaurants/nearby?lat=" +
              encodeURIComponent(latitude) +
              "&lng=" +
              encodeURIComponent(longitude) +
              "&radius=" +
              encodeURIComponent(radius)
          );

        const restaurants =
          await restaurantsResponse.json();

        if (!restaurantsResponse.ok) {
          showMapMessage(
            restaurants.message ||
              "Non è stato possibile cercare i ristoranti vicini.",
            "error"
          );

          return;
        }

        allRestaurants =
          Array.isArray(restaurants)
            ? restaurants
            : [];

        selectedRegion = "";

        setActiveRegionButton("");

        applyFilters();

        map.setView(
          [latitude, longitude],
          14
        );

        L.circle(
          [latitude, longitude],
          {
            radius: Number(radius) * 1000,
            color: "#b40000",
            fillColor: "#b40000",
            fillOpacity: 0.06,
            weight: 1
          }
        ).addTo(map);

        showMapMessage(
          "Ricerca completata.",
          "success"
        );
      } catch (error) {
        console.error(
          "Errore durante la ricerca nei dintorni:",
          error
        );

        showMapMessage(
          "Errore durante la ricerca nei dintorni.",
          "error"
        );
      } finally {
        nearbySearchButton.disabled = false;

        nearbySearchButton.innerHTML =
          '<i class="fa-solid fa-location-crosshairs"></i> Cerca ristoranti vicini';
      }
    }

    nearbySearchButton.addEventListener(
      "click",
      searchNearbyRestaurants
    );

    nearbySearchInput.addEventListener(
      "keydown",
      function (event) {
        if (event.key === "Enter") {
          searchNearbyRestaurants();
        }
      }
    );

    resetSearchButton.addEventListener(
      "click",
      async function () {
        selectedRegion = "";
        selectedCategory = "tutti";

        categoryButtons.forEach(function (button) {
          button.classList.toggle(
            "active",
            button.dataset.category === "tutti"
          );
        });

        setActiveRegionButton("");

        map.setView(
          [41.8719, 12.5674],
          6
        );

        await loadRestaurants();
      }
    );

    // =====================================================
    // AVVIO
    // =====================================================

    renderRegions();

    loadRestaurants();

    setTimeout(function () {
      map.invalidateSize();
    }, 250);
  </script>
</body>
</html>
