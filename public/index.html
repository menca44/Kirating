<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />

  <!-- Adatta correttamente il sito a computer, tablet e smartphone -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>KiRating</title>

  <!-- CSS della libreria Leaflet per la mappa -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- Libreria Font Awesome per le icone -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
  />

  <!-- CSS principale del sito -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <!-- =====================================================
       NAVBAR PRINCIPALE
       ===================================================== -->
  <header class="topbar">
    <!-- Logo cliccabile che riporta alla home -->
    <a href="/" class="logo" aria-label="Torna alla home">
      <img src="logo-kira.jpeg" alt="KiRating" />
    </a>

    <!-- Parte destra della navbar -->
    <div class="topbar-right">
      <!-- Collegamento alla pagina di login -->
      <a href="/login.html" class="login-link">
        Login
      </a>

      <!-- Menu a tendina -->
      <div class="dropdown">
        <button
          id="menuButton"
          class="menu-button"
          type="button"
          aria-label="Apri il menu"
          aria-expanded="false"
        >
          <span class="burger-top"></span>
          <span class="burger-filling burger-lettuce"></span>
          <span class="burger-filling burger-meat"></span>
          <span class="burger-bottom"></span>
        </button>

        <nav
          id="dropdownMenu"
          class="dropdown-menu hidden"
          aria-label="Menu principale"
        >
          <a href="/">Home</a>
          <a href="#italyMap">Mappa</a>
          <a href="/recensioni.html">Recensioni</a>
          <a href="#">Preferiti</a>
          <a href="#">Chi siamo</a>
        </nav>
      </div>
    </div>
  </header>

  <!-- =====================================================
       BARRA DELLE CATEGORIE
       ===================================================== -->
  <nav
    class="category-bar"
    aria-label="Categorie dei ristoranti"
  >
    <div
      id="categoryList"
      class="category-list"
    >
      <button
        class="category-item active"
        type="button"
        data-filter="all"
      >
        <span class="category-icon">
          <i class="fa-solid fa-utensils"></i>
        </span>

        <span class="category-label">
          Tutti
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="italiano"
      >
        <span class="category-icon">
          <i class="fa-solid fa-plate-wheat"></i>
        </span>

        <span class="category-label">
          Italiano
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="pizza"
      >
        <span class="category-icon">
          <i class="fa-solid fa-pizza-slice"></i>
        </span>

        <span class="category-label">
          Pizza
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="sushi"
      >
        <span class="category-icon">
          <i class="fa-solid fa-fish"></i>
        </span>

        <span class="category-label">
          Sushi
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="pesce"
      >
        <span class="category-icon">
          <i class="fa-solid fa-fish-fins"></i>
        </span>

        <span class="category-label">
          Pesce
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="carne"
      >
        <span class="category-icon">
          <i class="fa-solid fa-drumstick-bite"></i>
        </span>

        <span class="category-label">
          Carne
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="gourmet"
      >
        <span class="category-icon">
          <i class="fa-solid fa-star"></i>
        </span>

        <span class="category-label">
          Gourmet
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="fast-food"
      >
        <span class="category-icon">
          <i class="fa-solid fa-burger"></i>
        </span>

        <span class="category-label">
          Fast food
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="poke"
      >
        <span class="category-icon">
          <i class="fa-solid fa-bowl-food"></i>
        </span>

        <span class="category-label">
          Poke
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="vegetariano"
      >
        <span class="category-icon">
          <i class="fa-solid fa-leaf"></i>
        </span>

        <span class="category-label">
          Vegetariano
        </span>
      </button>

      <button
        class="category-item"
        type="button"
        data-filter="dolci"
      >
        <span class="category-icon">
          <i class="fa-solid fa-ice-cream"></i>
        </span>

        <span class="category-label">
          Dolci
        </span>
      </button>
    </div>
  </nav>

  <!-- =====================================================
       CONTENUTO PRINCIPALE
       ===================================================== -->
  <main class="home">
    <section class="map-section">

      <!-- =================================================
           PANNELLO DI RICERCA
           ================================================= -->
      <aside class="search-panel">
        <p class="section-label">
          Esplora l’Italia
        </p>

        <h1 id="mapTitle">
          Trova il tuo ristorante
        </h1>

        <p id="mapDescription">
          Cerca una posizione oppure seleziona una regione.
        </p>

        <!-- ===============================================
             RICERCA NEI DINTORNI
             =============================================== -->
        <section class="nearby-search-section">
          <h2>Cerca nei dintorni</h2>

          <form
            id="nearbySearchForm"
            class="nearby-search-form"
          >
            <label for="locationInput">
              Posizione
            </label>

            <input
              id="locationInput"
              name="location"
              type="text"
              placeholder="Es. Piazza Navona, Roma"
              autocomplete="off"
              required
            />

            <label for="radiusSelect">
              Distanza massima
            </label>

            <select
              id="radiusSelect"
              name="radius"
            >
              <option value="5">
                5 km
              </option>

              <option value="10" selected>
                10 km
              </option>

              <option value="25">
                25 km
              </option>

              <option value="50">
                50 km
              </option>
            </select>

            <button
              id="nearbySearchButton"
              class="search-button"
              type="submit"
            >
              Cerca
            </button>
          </form>
        </section>

        <!-- Separatore grafico -->
        <div class="panel-divider">
          <span>oppure</span>
        </div>

        <!-- ===============================================
             SELEZIONE DELLA REGIONE
             =============================================== -->
        <section class="regions-section">
          <h2>Scegli una regione</h2>

          <div
            id="regionsList"
            class="regions-list"
            aria-label="Elenco delle regioni italiane"
          ></div>
        </section>

        <!-- Messaggi sui risultati -->
        <div
          id="restaurantsStatus"
          class="restaurants-status hidden"
          aria-live="polite"
        ></div>

        <!-- Torna alla vista iniziale -->
        <button
          id="resetMapButton"
          class="reset-button hidden"
          type="button"
        >
          Torna all’Italia completa
        </button>
      </aside>

      <!-- =================================================
           MAPPA
           ================================================= -->
      <div class="map-panel">
        <div
          id="italyMap"
          aria-label="Mappa interattiva dei ristoranti italiani"
        ></div>

        <div
          id="mapError"
          class="map-error hidden"
        ></div>
      </div>
    </section>
  </main>

  <!-- Libreria JavaScript Leaflet -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    /* =====================================================
       MENU A TENDINA
       ===================================================== */

    const menuButton =
      document.getElementById("menuButton");

    const dropdownMenu =
      document.getElementById("dropdownMenu");

    menuButton.addEventListener("click", function (event) {
      event.stopPropagation();

      const menuIsClosed =
        dropdownMenu.classList.contains("hidden");

      dropdownMenu.classList.toggle("hidden");

      menuButton.setAttribute(
        "aria-expanded",
        String(menuIsClosed)
      );
    });

    document.addEventListener("click", function (event) {
      const clickInsideMenu =
        dropdownMenu.contains(event.target);

      const clickOnButton =
        menuButton.contains(event.target);

      if (!clickInsideMenu && !clickOnButton) {
        closeDropdownMenu();
      }
    });

    document.addEventListener("keydown", function (event) {
      if (event.key === "Escape") {
        closeDropdownMenu();
      }
    });

    function closeDropdownMenu() {
      dropdownMenu.classList.add("hidden");

      menuButton.setAttribute(
        "aria-expanded",
        "false"
      );
    }


    /* =====================================================
       ELEMENTI DELLA PAGINA
       ===================================================== */

    const mapTitle =
      document.getElementById("mapTitle");

    const mapDescription =
      document.getElementById("mapDescription");

    const nearbySearchForm =
      document.getElementById("nearbySearchForm");

    const locationInput =
      document.getElementById("locationInput");

    const radiusSelect =
      document.getElementById("radiusSelect");

    const nearbySearchButton =
      document.getElementById("nearbySearchButton");

    const regionsList =
      document.getElementById("regionsList");

    const restaurantsStatus =
      document.getElementById("restaurantsStatus");

    const resetMapButton =
      document.getElementById("resetMapButton");

    const categoryButtons =
      document.querySelectorAll(".category-item");


    /* =====================================================
       STATO DELL'APPLICAZIONE
       ===================================================== */

    let currentRestaurants = [];
    let currentSearchDescription = "";
    let activeRestaurantFilter = "all";


    /* =====================================================
       DATI DELLE REGIONI
       ===================================================== */

    const italianRegions = [
      {
        name: "Abruzzo",
        bounds: [[41.68, 13.00], [42.90, 14.80]]
      },
      {
        name: "Basilicata",
        bounds: [[39.88, 15.32], [41.15, 16.87]]
      },
      {
        name: "Calabria",
        bounds: [[37.90, 15.62], [40.15, 17.22]]
      },
      {
        name: "Campania",
        bounds: [[39.95, 13.75], [41.52, 15.82]]
      },
      {
        name: "Emilia Romagna",
        bounds: [[43.70, 9.15], [45.20, 12.80]]
      },
      {
        name: "Friuli Venezia Giulia",
        bounds: [[45.55, 12.30], [46.70, 13.95]]
      },
      {
        name: "Lazio",
        bounds: [[40.75, 11.45], [42.85, 14.05]]
      },
      {
        name: "Liguria",
        bounds: [[43.70, 7.45], [44.70, 10.10]]
      },
      {
        name: "Lombardia",
        bounds: [[44.65, 8.45], [46.65, 11.45]]
      },
      {
        name: "Marche",
        bounds: [[42.68, 12.15], [44.00, 13.92]]
      },
      {
        name: "Molise",
        bounds: [[41.35, 13.95], [42.10, 15.20]]
      },
      {
        name: "Piemonte",
        bounds: [[44.00, 6.60], [46.50, 9.25]]
      },
      {
        name: "Puglia",
        bounds: [[39.75, 14.90], [42.20, 18.55]]
      },
      {
        name: "Sardegna",
        bounds: [[38.75, 8.05], [41.35, 9.90]]
      },
      {
        name: "Sicilia",
        bounds: [[36.55, 11.90], [38.85, 15.75]]
      },
      {
        name: "Toscana",
        bounds: [[42.20, 9.65], [44.50, 12.40]]
      },
      {
        name: "Trentino-Alto Adige",
        bounds: [[45.60, 10.35], [47.15, 12.55]]
      },
      {
        name: "Umbria",
        bounds: [[42.35, 11.85], [43.65, 13.30]]
      },
      {
        name: "Valle d'Aosta",
        bounds: [[45.45, 6.75], [46.05, 7.95]]
      },
      {
        name: "Veneto",
        bounds: [[44.80, 10.60], [46.75, 13.10]]
      }
    ];


    /* =====================================================
       CREAZIONE DELLA MAPPA
       ===================================================== */

    const initialCenter = [42.5, 12.5];
    const initialZoom = 6;

    const map = L.map("italyMap", {
      zoomControl: true,
      attributionControl: true
    });

    map.setView(initialCenter, initialZoom);

    L.tileLayer(
      "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
      {
        maxZoom: 19,
        attribution: "&copy; OpenStreetMap contributors"
      }
    ).addTo(map);

    const restaurantsMarkersLayer =
      L.layerGroup().addTo(map);

    const searchedLocationLayer =
      L.layerGroup().addTo(map);

    const searchRadiusLayer =
      L.layerGroup().addTo(map);


    /* =====================================================
       CREAZIONE DEI PULSANTI DELLE REGIONI
       ===================================================== */

    function createRegionButtons() {
      italianRegions.forEach(function (region) {
        const button =
          document.createElement("button");

        button.type = "button";
        button.className = "region-button";
        button.textContent = region.name;
        button.dataset.region = region.name;

        button.addEventListener("click", function () {
          selectRegion(region);
        });

        regionsList.appendChild(button);
      });
    }


    /* =====================================================
       SELEZIONE DI UNA REGIONE
       ===================================================== */

    function selectRegion(region) {
      clearMapResults();

      updateActiveRegionButton(region.name);

      map.fitBounds(region.bounds, {
        padding: [30, 30],
        animate: true,
        duration: 0.8
      });

      mapTitle.textContent = region.name;

      mapDescription.textContent =
        "Stai visualizzando i ristoranti presenti in " +
        region.name +
        ".";

      resetMapButton.classList.remove("hidden");

      loadRestaurantsByRegion(region.name);
    }


    function updateActiveRegionButton(regionName) {
      const buttons =
        document.querySelectorAll(".region-button");

      buttons.forEach(function (button) {
        button.classList.toggle(
          "active",
          button.dataset.region === regionName
        );
      });
    }


    /* =====================================================
       FILTRI DELLE CATEGORIE
       ===================================================== */

    categoryButtons.forEach(function (button) {
      button.addEventListener("click", function () {
        activeRestaurantFilter =
          button.dataset.filter;

        categoryButtons.forEach(function (otherButton) {
          otherButton.classList.toggle(
            "active",
            otherButton === button
          );
        });

        renderFilteredRestaurants();
      });
    });


    function restaurantMatchesFilter(
      restaurant,
      filterName
    ) {
      if (filterName === "all") {
        return true;
      }

      const searchableText = [
        restaurant.name,
        restaurant.cuisine,
        restaurant.description
      ]
        .filter(Boolean)
        .join(" ")
        .toLowerCase();

      const filterKeywords = {
        italiano: [
          "italiana",
          "italiano",
          "romana",
          "toscana",
          "siciliana",
          "pugliese",
          "napoletana",
          "tradizionale",
          "trattoria",
          "osteria"
        ],

        pizza: [
          "pizza",
          "pizzeria",
          "napoletana"
        ],

        sushi: [
          "sushi",
          "giapponese",
          "japanese",
          "sashimi",
          "uramaki",
          "nigiri"
        ],

        pesce: [
          "pesce",
          "mare",
          "seafood",
          "ittico"
        ],

        carne: [
          "carne",
          "steakhouse",
          "griglieria",
          "braceria",
          "barbecue"
        ],

        gourmet: [
          "gourmet",
          "fine dining",
          "stellato",
          "alta cucina"
        ],

        "fast-food": [
          "fast food",
          "hamburger",
          "burger",
          "panino",
          "street food",
          "kebab"
        ],

        poke: [
          "poke",
          "pokè",
          "hawaiian"
        ],

        vegetariano: [
          "vegetariano",
          "vegetarian",
          "vegano",
          "vegan",
          "plant based"
        ],

        dolci: [
          "dolci",
          "dessert",
          "pasticceria",
          "gelateria",
          "gelato",
          "bakery"
        ]
      };

      const keywords =
        filterKeywords[filterName] || [];

      return keywords.some(function (keyword) {
        return searchableText.includes(keyword);
      });
    }


    function renderFilteredRestaurants() {
      restaurantsMarkersLayer.clearLayers();

      if (currentRestaurants.length === 0) {
        return;
      }

      const filteredRestaurants =
        currentRestaurants.filter(function (restaurant) {
          return restaurantMatchesFilter(
            restaurant,
            activeRestaurantFilter
          );
        });

      filteredRestaurants.forEach(function (restaurant) {
        addRestaurantMarker(restaurant);
      });

      updateRestaurantsStatus(
        filteredRestaurants.length
      );
    }


    function getActiveFilterLabel() {
      const activeButton =
        document.querySelector(".category-item.active");

      if (!activeButton) {
        return "Tutti";
      }

      return activeButton
        .querySelector(".category-label")
        .textContent
        .trim();
    }


    function updateRestaurantsStatus(resultCount) {
      const filterLabel =
        getActiveFilterLabel();

      if (resultCount === 0) {
        restaurantsStatus.textContent =
          activeRestaurantFilter === "all"
            ? "Nessun ristorante trovato " +
              currentSearchDescription +
              "."
            : "Nessun ristorante della categoria " +
              filterLabel +
              " trovato " +
              currentSearchDescription +
              ".";

        restaurantsStatus.classList.remove(
          "hidden",
          "error"
        );

        return;
      }

      const restaurantWord =
        resultCount === 1
          ? "ristorante trovato"
          : "ristoranti trovati";

      const categoryText =
        activeRestaurantFilter === "all"
          ? ""
          : " della categoria " + filterLabel;

      restaurantsStatus.textContent =
        resultCount +
        " " +
        restaurantWord +
        categoryText +
        " " +
        currentSearchDescription +
        ".";

      restaurantsStatus.classList.remove(
        "hidden",
        "error"
      );
    }


    /* =====================================================
       PROTEZIONE DEI TESTI HTML
       ===================================================== */

    function escapeHtml(value) {
      const temporaryElement =
        document.createElement("div");

      temporaryElement.textContent =
        value === null || value === undefined
          ? ""
          : String(value);

      return temporaryElement.innerHTML;
    }


    /* =====================================================
       CREAZIONE DEI MARKER DEI RISTORANTI
       ===================================================== */

    function addRestaurantMarker(restaurant) {
      const latitude =
        Number(restaurant.latitude);

      const longitude =
        Number(restaurant.longitude);

      if (
        !Number.isFinite(latitude) ||
        !Number.isFinite(longitude)
      ) {
        console.warn(
          "Coordinate non valide:",
          restaurant
        );

        return;
      }

      const marker =
        L.marker([latitude, longitude]);

      /*
        Link alla pagina completa del ristorante.

        Esempio:
        /ristorante.html?id=3
      */
      const restaurantPageUrl =
        "/ristorante.html?id=" +
        encodeURIComponent(restaurant.id);

      marker.bindPopup(`
        <div class="restaurant-popup">
          <strong class="restaurant-popup-name">
            ${escapeHtml(restaurant.name)}
          </strong>

          <span>
            <i class="fa-solid fa-location-dot"></i>

            ${escapeHtml(restaurant.city)},
            ${escapeHtml(restaurant.region)}
          </span>

          <span>
            ${escapeHtml(restaurant.address)}
          </span>

          <span class="restaurant-cuisine-popup">
            ${escapeHtml(
              restaurant.cuisine ||
              "Tipo di cucina non indicato"
            )}
          </span>

          ${
            Number.isFinite(
              Number(restaurant.distance_km)
            )
              ? `
                <span class="restaurant-distance">
                  Distanza:
                  ${escapeHtml(restaurant.distance_km)}
                  km
                </span>
              `
              : ""
          }

          ${
            restaurant.description
              ? `
                <p>
                  ${escapeHtml(restaurant.description)}
                </p>
              `
              : ""
          }

          <a
            href="${restaurantPageUrl}"
            class="restaurant-popup-link"
          >
            Vedi ristorante

            <i class="fa-solid fa-arrow-right"></i>
          </a>
        </div>
      `);

      marker.addTo(restaurantsMarkersLayer);
    }


    /* =====================================================
       RICERCA PER REGIONE
       ===================================================== */

    async function loadRestaurantsByRegion(regionName) {
      showLoadingStatus(
        "Caricamento dei ristoranti..."
      );

      try {
        const response = await fetch(
          "/restaurants?region=" +
          encodeURIComponent(regionName)
        );

        if (!response.ok) {
          throw new Error(
            "Errore HTTP " + response.status
          );
        }

        const restaurants =
          await response.json();

        if (!Array.isArray(restaurants)) {
          throw new Error(
            "La risposta non è un elenco."
          );
        }

        currentRestaurants = restaurants;
        currentSearchDescription = "in " + regionName;

        renderFilteredRestaurants();
      } catch (error) {
        currentRestaurants = [];

        showErrorStatus(
          "Non è stato possibile caricare i ristoranti."
        );

        console.error(error);
      }
    }


    /* =====================================================
       RICERCA NEI DINTORNI
       ===================================================== */

    nearbySearchForm.addEventListener(
      "submit",
      async function (event) {
        event.preventDefault();

        const searchText =
          locationInput.value.trim();

        const radius =
          Number(radiusSelect.value);

        if (searchText.length < 3) {
          showErrorStatus(
            "Inserisci una posizione di almeno 3 caratteri."
          );

          locationInput.focus();
          return;
        }

        setSearchButtonLoading(true);

        showLoadingStatus(
          "Ricerca della posizione..."
        );

        try {
          const geocodeResponse = await fetch(
            "/geocode?q=" +
            encodeURIComponent(searchText)
          );

          const geocodeData =
            await geocodeResponse.json();

          if (!geocodeResponse.ok) {
            throw new Error(
              geocodeData.message ||
              "Posizione non trovata."
            );
          }

          const location =
            geocodeData.location;

          const latitude =
            Number(location.latitude);

          const longitude =
            Number(location.longitude);

          if (
            !Number.isFinite(latitude) ||
            !Number.isFinite(longitude)
          ) {
            throw new Error(
              "Coordinate della posizione non valide."
            );
          }

          clearMapResults();
          updateActiveRegionButton(null);

          showSearchedLocation(
            latitude,
            longitude,
            location.displayName,
            radius
          );

          mapTitle.textContent =
            "Ristoranti nei dintorni";

          mapDescription.textContent =
            location.displayName;

          resetMapButton.classList.remove("hidden");

          showLoadingStatus(
            "Ricerca dei ristoranti vicini..."
          );

          const nearbyResponse = await fetch(
            "/restaurants/nearby" +
            "?lat=" +
            encodeURIComponent(latitude) +
            "&lng=" +
            encodeURIComponent(longitude) +
            "&radius=" +
            encodeURIComponent(radius)
          );

          const nearbyRestaurants =
            await nearbyResponse.json();

          if (!nearbyResponse.ok) {
            throw new Error(
              nearbyRestaurants.message ||
              "Errore durante la ricerca."
            );
          }

          if (!Array.isArray(nearbyRestaurants)) {
            throw new Error(
              "La risposta non è un elenco."
            );
          }

          currentRestaurants =
            nearbyRestaurants;

          currentSearchDescription =
            "entro " + radius + " km";

          renderFilteredRestaurants();
        } catch (error) {
          currentRestaurants = [];

          showErrorStatus(error.message);

          console.error(
            "Errore ricerca nei dintorni:",
            error
          );
        } finally {
          setSearchButtonLoading(false);
        }
      }
    );


    /* =====================================================
       POSIZIONE CERCATA E RAGGIO
       ===================================================== */

    function showSearchedLocation(
      latitude,
      longitude,
      displayName,
      radius
    ) {
      const locationMarker = L.circleMarker(
        [latitude, longitude],
        {
          radius: 10,
          color: "#ffffff",
          weight: 3,
          fillColor: "#b40000",
          fillOpacity: 1
        }
      );

      locationMarker.bindPopup(`
        <div class="searched-location-popup">
          <strong>Posizione cercata</strong>

          <span>
            ${escapeHtml(displayName)}
          </span>
        </div>
      `);

      locationMarker.addTo(searchedLocationLayer);

      const radiusCircle = L.circle(
        [latitude, longitude],
        {
          radius: radius * 1000,
          color: "#b40000",
          weight: 2,
          opacity: 0.75,
          fillColor: "#b40000",
          fillOpacity: 0.08
        }
      );

      radiusCircle.addTo(searchRadiusLayer);

      map.fitBounds(radiusCircle.getBounds(), {
        padding: [35, 35],
        animate: true
      });

      locationMarker.openPopup();
    }


    /* =====================================================
       MESSAGGI DI STATO
       ===================================================== */

    function showLoadingStatus(message) {
      restaurantsStatus.textContent = message;

      restaurantsStatus.classList.remove(
        "hidden",
        "error"
      );
    }


    function showErrorStatus(message) {
      restaurantsStatus.textContent = message;

      restaurantsStatus.classList.remove("hidden");
      restaurantsStatus.classList.add("error");
    }


    /* =====================================================
       STATO DEL PULSANTE CERCA
       ===================================================== */

    function setSearchButtonLoading(isLoading) {
      nearbySearchButton.disabled = isLoading;

      nearbySearchButton.textContent =
        isLoading
          ? "Ricerca..."
          : "Cerca";
    }


    /* =====================================================
       PULIZIA E RESET DELLA MAPPA
       ===================================================== */

    function clearMapResults() {
      restaurantsMarkersLayer.clearLayers();
      searchedLocationLayer.clearLayers();
      searchRadiusLayer.clearLayers();

      currentRestaurants = [];
      currentSearchDescription = "";

      restaurantsStatus.classList.add("hidden");
      restaurantsStatus.classList.remove("error");
    }


    function resetMap() {
      clearMapResults();

      updateActiveRegionButton(null);

      map.setView(initialCenter, initialZoom, {
        animate: true
      });

      mapTitle.textContent =
        "Trova il tuo ristorante";

      mapDescription.textContent =
        "Cerca una posizione oppure seleziona una regione.";

      resetMapButton.classList.add("hidden");
    }


    /* =====================================================
       AVVIO
       ===================================================== */

    createRegionButtons();

    resetMapButton.addEventListener(
      "click",
      resetMap
    );
  </script>
</body>
</html>
